<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Identificación QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="qr-body">

<div id="pantallaCarga" class="qr-loader-pantalla">
  <div class="qr-loader-caja">
    <div class="qr-loader-spinner"></div>
    <p>Cargando información...</p>
  </div>
</div>

<div id="modalNoConfig" class="qr-modal qr-oculto">
  <div class="qr-modal-contenido">
    <h3>Código no configurado</h3>
    <button id="btnConfigurar" class="qr-btn">Configurar</button>
  </div>
</div>

<div id="contenidoPrincipal" class="qr-contenedor qr-oculto">

<form id="formulario" class="qr-oculto">

<!-- FOTO -->
<div class="qr-foto">
  <img id="previewFoto" class="qr-foto-preview">
  <label for="fFoto" class="qr-foto-circulo">+</label>
  <input type="file" id="fFoto">
</div>

<select id="fTipo" required>
  <option value="">Tipo</option>
  <option value="persona">Persona</option>
  <option value="nino">Niño</option>
  <option value="adultoMayor">Adulto mayor</option>
  <option value="mascota">Mascota</option>
  <option value="objeto">Objeto</option>
</select>

<input id="fNombre" placeholder="Nombre" required>
<input id="fContacto" placeholder="Contacto" required>
<input id="fContacto2" placeholder="Emergencia">
<input id="fDireccion" placeholder="Dirección">

<!-- UBICACION -->
<select id="fProvincia">
  <option>Provincia</option>
  <option>Puntarenas</option>
  <option>San José</option>
</select>

<select id="fCanton">
  <option>Cantón</option>
</select>

<select id="fDistrito">
  <option>Distrito</option>
</select>

<textarea id="fMensaje" placeholder="Mensaje"></textarea>

<!-- PIN -->
<input id="fPin" type="password" placeholder="PIN" required>
<input id="fPinConfirmar" type="password" placeholder="Confirmar PIN" required>

<!-- PERSONA -->
<div id="seccionPersona" class="qr-oculto">
  <input id="fSangre" placeholder="Tipo sangre">
  <textarea id="fPadecimientos"></textarea>
  <textarea id="fAlergias"></textarea>

  <!-- NUEVO -->
  <input id="fEdad" placeholder="Edad">
  <input id="fEstatura" placeholder="Estatura">
  <input id="fPeso" placeholder="Peso">
  <input id="fCabello" placeholder="Cabello">
  <input id="fOjos" placeholder="Ojos">
</div>

<!-- MASCOTA -->
<div id="seccionMascota" class="qr-oculto">
  <input id="fEspecie">
  <input id="fRaza">
  <input id="fColor">

  <!-- NUEVO -->
  <select id="fEstadoMascota">
    <option value="">Estado</option>
    <option value="normal">En casa</option>
    <option value="perdido">Perdido</option>
  </select>

  <input id="fRecompensa" placeholder="Recompensa opcional">
</div>

<!-- OBJETO -->
<div id="seccionObjeto" class="qr-oculto">
  <textarea id="fDescripcion"></textarea>
  <textarea id="fInstrucciones"></textarea>
</div>

<button class="qr-btn">Guardar</button>

</form>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
