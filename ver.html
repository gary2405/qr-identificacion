<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <link rel="stylesheet" href="styles.css">

  <style>
    /* SOLO DISEÑO NUEVO (NO TOCA TU CSS ORIGINAL) */

    .app-container {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      background: black;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }

    .app-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .app-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(10px) brightness(0.6);
      transform: scale(1.1);
    }

    .app-content {
      position: relative;
      z-index: 2;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100vh;
    }

    .app-header {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      z-index: 3;
    }

    .app-btn-top {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .app-info {
      text-align: center;
      margin-bottom: 20px;
    }

    .app-info h1 {
      font-size: 28px;
      font-weight: 700;
    }

    .app-info p {
      opacity: 0.8;
      font-size: 14px;
    }

    .app-actions {
      display: flex;
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      margin-bottom: 15px;
    }

    .app-actions a,
    .app-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .app-card {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(15px);
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body class="qr-body">

<!-- HEADER TIPO APP -->
<div class="app-container">

  <div class="app-bg">
    <img id="fondoApp">
  </div>

  <div class="app-header">
    <div class="app-btn-top">✕</div>
    <div class="app-btn-top">⋯</div>
  </div>

  <div class="app-content">

    <!-- INFO PRINCIPAL -->
    <div class="app-info">
      <h1 id="nombre"></h1>
      <p id="tipo"></p>
      <p id="direccion"></p>
    </div>

    <!-- BOTONES -->
    <div class="app-actions">
      <a id="linkLlamar">Llamar</a>
      <a id="linkWhatsapp">WhatsApp</a>
      <button id="btnCompartir">Compartir</button>
    </div>

    <!-- MENSAJE -->
    <div class="app-card">
      <p id="mensaje"></p>
    </div>

    <!-- EMERGENCIA -->
    <div id="bloqueEmergencia" class="app-card qr-oculto">
      <p><strong>Contacto de emergencia</strong></p>
      <a id="linkLlamar2">Llamar</a><br>
      <a id="linkWhatsapp2">WhatsApp</a>
    </div>

    <!-- GPS -->
    <div id="bloqueGPS" class="app-card qr-oculto">
      <p id="textoUbicacion"></p>
      <a id="linkMapa">Ver ubicación</a>
    </div>

    <!-- PERSONA -->
    <div id="verPersona" class="app-card qr-oculto">
      <p><strong>Información médica</strong></p>
      <p id="verSangre"></p>
      <p id="verPadecimientos"></p>
      <p id="verAlergias"></p>
    </div>

    <!-- MASCOTA -->
    <div id="verMascota" class="app-card qr-oculto">
      <p><strong>Mascota</strong></p>
      <p id="verEspecie"></p>
      <p id="verRaza"></p>
      <p id="verColor"></p>
    </div>

    <!-- OBJETO -->
    <div id="verObjeto" class="app-card qr-oculto">
      <p><strong>Objeto</strong></p>
      <p id="verDescripcion"></p>
      <p id="verInstrucciones"></p>
    </div>

  </div>
</div>

<!-- MODAL COMPARTIR -->
<div id="modalCompartir" class="qr-modal qr-oculto">
  <div class="qr-modal-contenido">
    <h3>Compartir</h3>
    <input id="inputURLCompartir" type="text" readonly>
    <button id="btnCopiarURL">Copiar</button>
    <button id="btnCerrarModal">Cerrar</button>
  </div>
</div>

<script type="module" src="ver.js"></script>

<script>
  // USAR LA FOTO COMO FONDO AUTOMÁTICO
  const foto = document.getElementById("foto");
  const fondo = document.getElementById("fondoApp");

  const observer = new MutationObserver(() => {
    if (foto && foto.src) {
      fondo.src = foto.src;
    }
  });

  if (foto) {
    observer.observe(foto, { attributes: true });
  }
</script>

</body>
</html>
