<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="qr-body">
<div class="perfil-card">
  <img id="foto" class="perfil-avatar">
  <h2 id="nombre"></h2>
  <p id="tipo"></p>
  <p id="direccion"></p>
  <p id="mensaje"></p>

  <div id="verPersona" class="qr-oculto">
    <span id="verSangre"></span>
    <span id="verPadecimientos"></span>
    <span id="verAlergias"></span>
  </div>

  <div id="verMascota" class="qr-oculto">
    <span id="verEspecie"></span>
    <span id="verRaza"></span>
    <span id="verColor"></span>
  </div>

  <div id="verObjeto" class="qr-oculto">
    <span id="verDescripcion"></span>
    <span id="verInstrucciones"></span>
  </div>

<script type="module" src="ver.js"></script>
</body>
</html>
